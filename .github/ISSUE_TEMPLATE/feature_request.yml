name: Feature Request
description: Suggest a new format, improvement, or idea
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or new format you'd like to see.
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Why is this useful? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Show an example input/output if applicable.
      render: markdown
